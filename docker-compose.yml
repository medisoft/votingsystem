services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: registration
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: voting
    ports: ['15432:5432']
    volumes: [registration-postgres:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voting -d registration']
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    image: node:24.15.0-bookworm
    working_dir: /workspace
    command:
      [
        'sh',
        '-c',
        'npm run db:migrate -w @voting/registration-api && npm run dev -w @voting/registration-api',
      ]
    environment:
      DATABASE_URL: postgresql://voting:voting@postgres:5432/registration?schema=public
      ADMIN_ORIGIN: http://localhost:5173
    ports: ['3000:3000']
    volumes: ['.:/workspace']
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
  admin:
    image: node:24.15.0-bookworm
    working_dir: /workspace
    command: npm run dev -w @voting/registration-admin
    environment:
      API_PROXY_TARGET: http://api:3000
    ports: ['5173:5173']
    volumes: ['.:/workspace']
    depends_on:
      api:
        condition: service_healthy
volumes:
  registration-postgres:
